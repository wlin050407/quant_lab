paths:
  data_root: data
  raw: data/raw
  processed: data/processed

defaults:
  underlying:
    period: "5y"
    interval: "1d"
  option_chain:
    max_expiries: 12
    skip_zero_volume_and_oi: false

# GEX / pin: r, q, and Black-76 vs BS (see factors/rates.py).
# Override r via QUANT_LAB_RISK_FREE_RATE; q via QUANT_LAB_DIVIDEND_YIELD_SPX etc.
positioning:
  risk_free_rate: 0.05
  # Run scripts/update_sofr_rates.py locally; columns date, rate (decimal).
  risk_free_rate_series: data/processed/rates/sofr_daily.parquet
  dividend_yield:
    default: 0.013
    SPX: 0.013
    SPY: 0.013
    QQQ: 0.006

data_source:
  active: yfinance
  yfinance:
    request_sleep_seconds: 0.4
  thetadata:
    option_root: SPX
    index_symbol: SPX
    pin_play_times_et: ["10:00:00", "13:00:00", "15:30:00"]
    strike_range: 40
