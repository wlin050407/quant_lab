    regime: short_gamma
    spot_below_flip: true

  - date: "2022-06-13"
    provider: spotgamma_blog
    source: "2022 bear market — sustained short-gamma (public commentary + our gex_history)"
    regime: short_gamma

  - date: "2024-12-04"
    provider: spotgamma_blog
    source: "2024 Q4 rally — long-gamma regime"
    regime: long_gamma
