# Free GEX calibration references (no SpotGamma subscription).
#
# Providers:
#   spotgamma_blog  — public SpotGamma articles (direction-only)
#   flashalpha      — archived FlashAlpha API snapshots (see scripts/archive_flashalpha_gex.py)
#   optionsgex      — manual entry from https://optionsgex.com (no API)
#   gex_metrix      — manual entry from https://www.gexmetrix.com/demo (SPX)
#
# Units: net_gex_bn_per_1pct = billions of $ dealer hedge flow per 1% move
#        (same convention as factors/gex.py → net_gex_bn_per_1pct()).

references:
